# Builds and pushes the @agu/web Cloud Run image to Artifact Registry.
#
# NEXT_PUBLIC_API_URL is baked in at build time (Next.js inlines NEXT_PUBLIC_*
# vars into the client bundle), so it must be passed as a substitution when
# the API's public URL is known/changes:
#
#   gcloud builds submit --config=cloudbuild.web.yaml \
#     --substitutions=_NEXT_PUBLIC_API_URL=https://agu-takvim-api-xxxxx-ew.a.run.app .

substitutions:
  _AR_HOST: europe-west1-docker.pkg.dev
  _AR_REPO: agu-kampus-takvimi-pilot/agu-takvim-containers
  _IMAGE: web
  # Placeholder default — override with the real agu-takvim-api Cloud Run
  # URL via --substitutions once it's known (see docs/pilot/DEPLOYMENT_GCP.md).
  _NEXT_PUBLIC_API_URL: https://agu-takvim-api-placeholder.a.run.app

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8

timeout: 1800s

steps:
  - id: build-web
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - --build-arg
      - NEXT_PUBLIC_API_URL=${_NEXT_PUBLIC_API_URL}
      - -f
      - apps/web/Dockerfile
      - -t
      - ${_AR_HOST}/${_AR_REPO}/${_IMAGE}:${COMMIT_SHA}
      - -t
      - ${_AR_HOST}/${_AR_REPO}/${_IMAGE}:latest
      - .

images:
  - ${_AR_HOST}/${_AR_REPO}/${_IMAGE}:${COMMIT_SHA}
  - ${_AR_HOST}/${_AR_REPO}/${_IMAGE}:latest
