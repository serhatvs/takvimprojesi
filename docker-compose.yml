services:
  postgres:
    image: postgres:17-alpine
    container_name: agu-kampus-takvimi-postgres
    environment:
      POSTGRES_DB: agu_kampus_takvimi
      POSTGRES_USER: agu
      POSTGRES_PASSWORD: agu_dev_password
      TZ: Europe/Istanbul
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agu -d agu_kampus_takvimi"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
