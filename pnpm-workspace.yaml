packages:
  - "apps/*"
  - "packages/*"
engineStrict: true
minimumReleaseAgeExclude:
  - '@turbo/darwin-64@2.10.6'
  - '@turbo/darwin-arm64@2.10.6'
  - '@turbo/linux-64@2.10.6'
  - '@turbo/linux-arm64@2.10.6'
  - '@turbo/windows-64@2.10.6'
  - '@turbo/windows-arm64@2.10.6'
  - turbo@2.10.6
packageImportMethod: copy
storeDir: .pnpm-store

allowBuilds:
  '@prisma/engines': true
  esbuild: true
  prisma: true
