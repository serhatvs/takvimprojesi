# Builds and pushes the @agu/api Cloud Run images (service + migration job)
# to Artifact Registry.
#
# Run manually with:
#   gcloud builds submit --config=cloudbuild.api.yaml .
#
# Both images are tagged with the triggering commit SHA and with `latest`
# (and the migration image additionally with a `migrate-` prefix) so Cloud
# Run deploys can pin to an exact, reproducible image.

substitutions:
  _AR_HOST: europe-west1-docker.pkg.dev
  _AR_REPO: agu-kampus-takvimi-pilot/agu-takvim-containers
  _IMAGE: api

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8

timeout: 1800s

steps:
  # --- API service image ---
  - id: build-api
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - --target=api
      - -f
      - apps/api/Dockerfile
      - -t
      - ${_AR_HOST}/${_AR_REPO}/${_IMAGE}:${COMMIT_SHA}
      - -t
      - ${_AR_HOST}/${_AR_REPO}/${_IMAGE}:latest
      - .

  # --- Migration Cloud Run Job image (same Dockerfile, different target) ---
  - id: build-api-migrate
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - --target=migrate
      - -f
      - apps/api/Dockerfile
      - -t
      - ${_AR_HOST}/${_AR_REPO}/${_IMAGE}:migrate-${COMMIT_SHA}
      - -t
      - ${_AR_HOST}/${_AR_REPO}/${_IMAGE}:migrate-latest
      - .

# Listing images here makes Cloud Build push every tag to Artifact Registry
# after both build steps succeed.
images:
  - ${_AR_HOST}/${_AR_REPO}/${_IMAGE}:${COMMIT_SHA}
  - ${_AR_HOST}/${_AR_REPO}/${_IMAGE}:latest
  - ${_AR_HOST}/${_AR_REPO}/${_IMAGE}:migrate-${COMMIT_SHA}
  - ${_AR_HOST}/${_AR_REPO}/${_IMAGE}:migrate-latest
